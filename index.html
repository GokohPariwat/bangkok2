<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบข้อมูลสถานที่เลือกตั้ง - สำนักงานเขตพญาไท</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f5fa; }
        .bg-dopa-purple { background-color: #6a1b9a; background-image: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%); }
        .text-dopa-purple { color: #6a1b9a; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }
        
        /* การล็อคหน้าจอ */
        .h-screen-fixed { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body class="h-screen-fixed">

    <!-- Header (Compact) -->
    <header class="bg-dopa-purple text-white py-2 shadow-md shrink-0 flex items-center justify-center">
        <div class="text-center px-2">
            <h1 class="text-lg font-bold">ระบบข้อมูลสถานที่เลือกตั้ง</h1>
            <h2 class="text-xs opacity-90">สำนักงานเขตพญาไท</h2>
        </div>
    </header>

    <!-- Main Content (Fits in viewport) -->
    <main class="flex-grow flex flex-col md:flex-row p-2 gap-2 overflow-hidden">
        <!-- Left: Status -->
        <div class="flex-1 bg-white rounded-xl shadow-sm flex flex-col p-3 items-center justify-center text-center">
            <h3 class="font-bold text-sm mb-1">ตรวจสอบสิทธิและสถานที่</h3>
            <p class="text-[10px] text-gray-500 mb-2">ตรวจสอบผ่านระบบกรมการปกครอง</p>
            <a href="https://boraservices.bora.dopa.go.th/election/enqelection-local/" target="_blank" class="px-4 py-2 bg-dopa-purple text-white rounded-lg text-xs font-bold hover:bg-purple-800">เข้าสู่ระบบ</a>
        </div>

        <!-- Right: Map -->
        <div class="flex-1 bg-white rounded-xl shadow-sm flex flex-col p-3 items-center justify-center text-center">
            <h3 class="font-bold text-sm mb-1">แผนที่หน่วยเลือกตั้ง</h3>
            <p class="text-[10px] text-gray-500 mb-2">ดูจุดที่ตั้งหน่วยเลือกตั้งทั้งหมด</p>
            <a href="https://gokohpariwat.github.io/bangkok1/" target="_blank" class="px-4 py-2 bg-green-500 text-white rounded-lg text-xs font-bold hover:bg-green-600">ดูแผนที่</a>
        </div>
    </main>

    <!-- Footer (Compact) -->
    <footer class="py-2 text-center shrink-0 border-t border-gray-200">
        <a href="https://forms.gle/dMC6cS98jwwPZPR46" target="_blank" class="text-[10px] font-bold text-purple-700 underline">ข้อเสนอแนะ Click!!</a>
        <p class="text-[9px] text-gray-400 mt-1">สำนักงานเขตพญาไท</p>
    </footer>

    <!-- Mobile Menu Container (Fixed to bottom right) -->
    <div class="fixed bottom-4 right-4 z-50 flex flex-col items-end">
        <div id="fabMenu" class="hidden flex-col items-end mb-2 space-y-2 opacity-0 transition-opacity duration-300">
            <button onclick="openCandidateModal('gov')" class="bg-white px-3 py-2 rounded-full shadow-lg border text-[10px] font-bold text-gray-700">ผู้สมัครผู้ว่าฯ กทม.</button>
            <button onclick="openCandidateModal('sk')" class="bg-white px-3 py-2 rounded-full shadow-lg border text-[10px] font-bold text-gray-700">ผู้สมัคร ส.ก. เขตพญาไท</button>
        </div>
        <button id="mainFabBtn" class="bg-dopa-purple text-white px-4 py-3 rounded-full shadow-xl text-xs font-bold animate-pulse hover:scale-105 transition-transform">
            ตรวจสอบหมายเลขผู้สมัครฯ
        </button>
    </div>

    <!-- Modals (Hidden) -->
    <div id="modal-gov" class="fixed inset-0 bg-black/50 z-50 hidden p-4 items-center justify-center" onclick="closeCandidateModal('gov')">
        <div class="bg-white w-full max-w-sm rounded-xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-3 bg-purple-50 text-dopa-purple font-bold text-sm flex justify-between">ผู้สมัครผู้ว่าฯ กทม. <button onclick="closeCandidateModal('gov')">✕</button></div>
            <div class="p-3 h-64 overflow-y-auto custom-scrollbar grid grid-cols-3 gap-2" id="gov-candidates-grid"></div>
        </div>
    </div>

    <div id="modal-sk" class="fixed inset-0 bg-black/50 z-50 hidden p-4 items-center justify-center" onclick="closeCandidateModal('sk')">
        <div class="bg-white w-full max-w-sm rounded-xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-3 bg-pink-50 text-pink-600 font-bold text-sm flex justify-between">ผู้สมัคร ส.ก. เขตพญาไท <button onclick="closeCandidateModal('sk')">✕</button></div>
            <div class="p-3 h-64 overflow-y-auto custom-scrollbar grid grid-cols-3 gap-2" id="sk-candidates-grid"></div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="modal-image" class="fixed inset-0 bg-black z-[60] hidden flex items-center justify-center p-2" onclick="closeImageModal()">
        <img id="modal-image-preview" src="" class="max-h-[80vh] object-contain rounded-lg">
    </div>

    <script>
        // Toggle Mobile Menu
        const mainFabBtn = document.getElementById('mainFabBtn');
        const fabMenu = document.getElementById('fabMenu');
        
        mainFabBtn.addEventListener('click', () => {
            fabMenu.classList.toggle('hidden');
            fabMenu.classList.toggle('flex');
            setTimeout(() => fabMenu.classList.toggle('opacity-0'), 10);
        });

        function generateCards(containerId, prefix, count) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const fileName = `${prefix}${i}.jpg`;
                const btn = document.createElement('button');
                btn.className = 'bg-gray-100 rounded-lg overflow-hidden border p-1 text-[10px]';
                btn.onclick = () => openImageModal(fileName);
                btn.innerHTML = `<img src="${fileName}" onerror="this.src='https://placehold.co/100x150?text=${i}'" class="w-full aspect-[3/4] object-cover rounded mb-1">เบอร์ ${i}`;
                container.appendChild(btn);
            }
        }

        function openCandidateModal(type) {
            fabMenu.classList.add('hidden');
            if(type === 'gov') { generateCards('gov-candidates-grid', 'A', 18); document.getElementById('modal-gov').classList.replace('hidden', 'flex'); }
            else { generateCards('sk-candidates-grid', 'B', 7); document.getElementById('modal-sk').classList.replace('hidden', 'flex'); }
        }

        function closeCandidateModal(type) { document.getElementById(`modal-${type}`).classList.replace('flex', 'hidden'); }
        function openImageModal(src) { document.getElementById('modal-image-preview').src = src; document.getElementById('modal-image').classList.replace('hidden', 'flex'); }
        function closeImageModal() { document.getElementById('modal-image').classList.replace('flex', 'hidden'); }
    </script>
</body>
</html>
